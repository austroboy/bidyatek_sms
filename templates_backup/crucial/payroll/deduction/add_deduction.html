{% load widget_tweaks %}
{% block content %}
<form hx-post="{{ request.path }}" hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}' class="modal-content">
  <div>
    <h4 class="modal-header">Add-Edit Deduction Type</h4>
  </div>
  <div class="modal-body">
    <div class="mb-3">
      <label for="{{ form.deduction_type.id_for_label }}" class="form-label">Name</label>
      {% render_field form.deduction_type class+="form-control" placeholder="Name" %}
    </div> 

    <div class="mb-3 form-check">
      <label for="{{ form.is_every_month.id_for_label }}" class="form-check-label">Is every month?</label>
      {% render_field form.is_every_month class="form-check-input" %}
    </div>

    
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
    <button type="submit" class="btn  btn-primary ">Save</button>
  </div>
</form>

{% endblock content %}
