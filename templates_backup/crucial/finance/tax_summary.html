<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Summary</title>
</head>
<body>
    <h1>{{ heading }}</h1>
    <h2>{{ subheading }}</h2>
    <form method="get">
        <input type="text" name="q" placeholder="Search by name or ID">
        <button type="submit">Search</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Employee Name</th>
                <th>Tax Type</th>
                <th>Annual Income</th>
                <th>Tax Amount</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for profile in tax_profiles %}
            <tr>
                <td>{{ profile.employee.name }}</td>
                <td>{{ profile.tax_type }}</td>
                <td>{{ profile.annual_income }}</td>
                <td>{{ profile.tax_amount }}</td>
                <td><a href="{% url 'tax_detail' profile.id %}">Details</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
