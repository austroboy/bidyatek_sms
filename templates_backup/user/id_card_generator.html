<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Body */
        body {
            background: linear-gradient(135deg, #1f1f2e 0%, #2c2c3e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #f5f5f5;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        /* Card base */
        .card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            margin-bottom: 20px;
            background: #2c2c3e; /* Dark premium base for all cards */
            color: #f5f5f5;
        }
        
        /* Card header */
        .card-header {
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            color: #fff;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
            font-weight: 600;
        }
        
        /* Form controls */
        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #555;
            padding: 10px 15px;
            background: #1f1f2e;
            color: #f5f5f5;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #6a5acd;
            box-shadow: 0 0 0 0.25rem rgba(106, 90, 205, 0.25);
            background: #2c2c3e;
            color: #fff;
        }
        
        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #6a5acd 0%, #836fff 100%);
            border: none;
            border-radius: 10px;
            padding: 10px 30px;
            font-weight: 600;
            color: #fff;
        }
        
        .btn-outline-primary {
            border-color: #6a5acd;
            color: #6a5acd;
        }
        
        .btn-outline-primary:hover {
            background: #6a5acd;
            color: #fff;
        }
        
        .btn-outline-danger {
            border-color: #dc3545;
            color: #dc3545;
        }
        
        .btn-outline-danger:hover {
            background: #dc3545;
            color: #fff;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
        }
        
        /* Template preview */
        .template-preview {
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .template-preview:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        
        .template-preview.active {
            border-color: #6a5acd;
            box-shadow: 0 0 20px rgba(106,90,205,0.5);
        }
        
        /* Preview container */
        .preview-container {
            background: #1f1f2e;
            border-radius: 10px;
            padding: 20px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        }
        
        /* ID Card sample */
        .id-card-sample {
            width: 340px;
            height: 214px;
            perspective: 1000px;
        }
        
        .id-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }
        
        .id-card-sample:hover .id-card-inner {
            transform: rotateY(180deg);
        }
        
        .id-card-front, .id-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 15px;
            overflow: hidden;
            background: #2c2c3e;
            color: #fff;
        }
        
        .id-card-back {
            transform: rotateY(180deg);
        }
        
        /* Selected students */
        .selected-students {
            max-height: 300px;
            overflow-y: auto;
            background: #1f1f2e;
            border-radius: 10px;
            padding: 10px;
        }
        
        .student-item {
            padding: 10px;
            border-bottom: 1px solid #444;
            transition: background 0.3s;
            color: #f5f5f5;
        }
        
        .student-item:hover {
            background: #33334d;
        }
        
        /* Badge count */
        .badge-count {
            background: linear-gradient(135deg, #6a5acd 0%, #836fff 100%);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        /* Debug info */
        .debug-info {
            font-size: 12px;
            color: #ccc;
            background: #2c2c3e;
            padding: 5px;
            border-radius: 5px;
            margin-top: 5px;
        }
        
        /* Scrollbars for dark theme */
        .selected-students::-webkit-scrollbar {
            width: 8px;
        }
        
        .selected-students::-webkit-scrollbar-thumb {
            background-color: #6a5acd;
            border-radius: 4px;
        }
        
        .selected-students::-webkit-scrollbar-track {
            background: #1f1f2e;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h3 class="mb-0"><i class="fas fa-id-card me-2"></i>ID Card Generator</h3>
                    </div>
                    <div class="card-body">
                        {% csrf_token %}
                        <div class="row">
                            <!-- Left Column: Filters -->
                            <div class="col-md-4">
                                <div class="card">
                                    <div class="card-body">
                                        <h5 class="card-title"><i class="fas fa-filter me-2"></i>Filter Students</h5>
                                        <div class="mb-3">
                                            <label class="form-label">Class</label>
                                            <select class="form-select" id="classFilter">
                                                <option value="">All Classes</option>
                                                {% for class in classes %}
                                                    <option value="{{ class.id }}">{{ class.name }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Section</label>
                                            <select class="form-select" id="sectionFilter">
                                                <option value="">All Sections</option>
                                                {% for section in sections %}
                                                    <option value="{{ section.id }}">{{ section.name }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Shift</label>
                                            <select class="form-select" id="shiftFilter">
                                                <option value="">All Shifts</option>
                                                {% for shift in shifts %}
                                                    <option value="{{ shift.id }}">{{ shift.name }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Version</label>
                                            <select class="form-select" id="versionFilter">
                                                <option value="">All Versions</option>
                                                {% for version in versions %}
                                                    <option value="{{ version.0 }}">{{ version.1 }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                        <button class="btn btn-primary w-100" id="loadStudents">
                                            <i class="fas fa-search me-2"></i>Load Students
                                        </button>
                                        <div class="debug-info mt-2" id="debugInfo">
                                            <!-- Debug info will appear here -->
                                        </div>
                                    </div>
                                </div>

                                <!-- Selected Students -->
                                <div class="card mt-3">
                                    <div class="card-body">
                                        <h5 class="card-title d-flex justify-content-between align-items-center">
                                            <span><i class="fas fa-users me-2"></i>Selected Students</span>
                                            <span class="badge-count" id="selectedCount">0</span>
                                        </h5>
                                        <div class="selected-students" id="selectedStudents">
                                            <p class="text-muted text-center">No students selected</p>
                                        </div>
                                        <div class="mt-3">
                                            <button class="btn btn-outline-primary w-100 mb-2" id="selectAll">
                                                <i class="fas fa-check-double me-2"></i>Select All
                                            </button>
                                            <button class="btn btn-outline-danger w-100" id="clearAll">
                                                <i class="fas fa-times me-2"></i>Clear All
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Middle Column: Template Selection -->
                            <div class="col-md-8">
                                <div class="card">
                                    <div class="card-body">
                                        <h5 class="card-title"><i class="fas fa-palette me-2"></i>Choose Template</h5>
                                        <div class="row g-3" id="templateGallery">
                                            <!-- Templates will be loaded here -->
                                        </div>
                                        
                                        <!-- Preview Area -->
                                        <div class="preview-container mt-4" id="previewArea">
                                            <div class="id-card-sample">
                                                <div class="id-card-inner">
                                                    <div class="id-card-front">
                                                        <!-- Front preview will be loaded here -->
                                                    </div>
                                                    <div class="id-card-back">
                                                        <!-- Back preview will be loaded here -->
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Layout Options -->
                                        <div class="row mt-4">
                                            <div class="col-md-6">
                                                <label class="form-label">Layout Options</label>
                                                <select class="form-select" id="layoutOption">
                                                    <option value="single">Single ID Card per page</option>
                                                    <option value="double">Two ID Cards per page</option>
                                                    <option value="multiple">Multiple ID Cards per page</option>
                                                </select>
                                            </div>
                                            <div class="col-md-6 d-flex align-items-end">
                                                <button class="btn btn-success w-100" id="generatePdf">
                                                    <i class="fas fa-file-pdf me-2"></i>Generate & Download PDF
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Function to get CSRF token from cookies
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    // Does this cookie string begin with the name we want?
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        // Set up CSRF token for all AJAX requests
        const csrftoken = getCookie('csrftoken');
        
        // Configure AJAX to include CSRF token
        $.ajaxSetup({
            beforeSend: function(xhr, settings) {
                if (!this.crossDomain) {
                    xhr.setRequestHeader("X-CSRFToken", csrftoken);
                }
            }
        });
        
        $(document).ready(function() {
            let selectedStudents = new Set();
            let currentTemplate = '1';
            let currentStudentsList = [];
            
            // Load template previews
            loadTemplates();
            
            // Load students when filter button clicked
            $('#loadStudents').click(loadStudents);
            
            // Select all students
            $('#selectAll').click(function() {
                $('.student-checkbox').prop('checked', true);
                $('.student-checkbox').each(function() {
                    const studentId = $(this).val();
                    selectedStudents.add(studentId);
                });
                updateSelectedCount();
                updateSelectedList();
            });
            
            // Clear all selection
            $('#clearAll').click(function() {
                $('.student-checkbox').prop('checked', false);
                selectedStudents.clear();
                updateSelectedCount();
                updateSelectedList();
            });
            
            // Generate PDF
            $('#generatePdf').click(generatePdf);
            
            // Load template previews
            function loadTemplates() {
                const templates = [
                    {id: '1', name: 'Modern Blue', color: '#667eea'},
                    {id: '2', name: 'Elegant Purple', color: '#764ba2'},
                    {id: '3', name: 'Professional Green', color: '#28a745'},
                    {id: '4', name: 'Royal Gold', color: '#ffd700'},
                    {id: '5', name: 'Tech Gradient', color: '#4facfe'},
                    {id: '6', name: 'Classic Red', color: '#dc3545'}
                   
                ];
                
                let html = '';
                templates.forEach(template => {
                    html += `
                        <div class="col-md-4 col-lg-2">
                            <div class="template-preview ${template.id === '1' ? 'active' : ''}" 
                                 data-template="${template.id}"
                                 onclick="selectTemplate('${template.id}')">
                                <div class="card" style="border-color: ${template.color};">
                                    <div class="card-body text-center p-2">
                                        <div style="width: 100%; height: 100px; background: linear-gradient(135deg, ${template.color} 0%, ${template.color}99 100%); border-radius: 8px; margin-bottom: 10px;"></div>
                                        <h6 class="mb-0">${template.name}</h6>
                                        <small class="text-muted">Template ${template.id}</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                $('#templateGallery').html(html);
                loadTemplatePreview('1');
            }
            
            // Load students based on filters
            function loadStudents() {
                const classId = $('#classFilter').val();
                const sectionId = $('#sectionFilter').val();
                const shiftId = $('#shiftFilter').val();
                const version = $('#versionFilter').val();
                
                // Show loading
                $('#debugInfo').html('<i class="fas fa-spinner fa-spin"></i> Loading students...');
                
                $.ajax({
                    url: '{% url "get_students_for_id_card" %}',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        class_id: classId,
                        section_id: sectionId,
                        shift_id: shiftId,
                        version: version
                    }),
                    success: function(response) {
                        if (response.error) {
                            $('#debugInfo').html(`<span class="text-danger">Error: ${response.error}</span>`);
                            alert('Error: ' + response.error);
                            return;
                        }
                        $('#debugInfo').html(`Found ${response.count || response.students.length} students`);
                        currentStudentsList = response.students;
                        displayStudents(response.students);
                    },
                    error: function(xhr, status, error) {
                        let errorMsg = 'Error loading students';
                        try {
                            const errorData = JSON.parse(xhr.responseText);
                            errorMsg = errorData.error || errorMsg;
                        } catch(e) {
                            errorMsg = error || xhr.statusText;
                        }
                        $('#debugInfo').html(`<span class="text-danger">${errorMsg}</span>`);
                        alert('Error: ' + errorMsg);
                    }
                });
            }
            
            // Display students in a modal
            function displayStudents(students) {
                if (students.length === 0) {
                    alert('No students found with the selected filters');
                    return;
                }
                
                let html = '<h6>Select Students:</h6>';
                html += `<div class="mb-2">
                        <button class="btn btn-sm btn-outline-primary" onclick="selectAllInModal()">Select All in List</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="deselectAllInModal()">Deselect All</button>
                        </div>`;
                
                students.forEach(student => {
                    const isSelected = selectedStudents.has(student.id.toString());
                    html += `
                        <div class="form-check student-item">
                            <input class="form-check-input student-checkbox" type="checkbox" 
                                   value="${student.id}" id="student_${student.id}"
                                   ${isSelected ? 'checked' : ''}
                                   onchange="toggleStudent(${student.id})">
                            <label class="form-check-label" for="student_${student.id}">
                                <strong>${student.name || 'No Name'}</strong><br>
                                <small class="text-muted">
                                    Roll: ${student.roll_no || 'N/A'} | 
                                    Class: ${student.class?.name || 'N/A'} | 
                                    Section: ${student.section?.name || 'N/A'}
                                </small>
                            </label>
                        </div>
                    `;
                });
                
                // Show in a modal
                const modalHtml = `
                    <div class="modal" id="studentsModal" tabindex="-1">
                        <div class="modal-dialog modal-lg">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title">Select Students (${students.length} found)</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body" style="max-height: 400px; overflow-y: auto;">
                                    ${html}
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Done</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                // Remove existing modal if any
                $('#studentsModal').remove();
                $('body').append(modalHtml);
                $('#studentsModal').modal('show');
                
                // Remove modal after closing
                $('#studentsModal').on('hidden.bs.modal', function() {
                    $(this).remove();
                });
            }
            
            // Helper functions for modal
            window.selectAllInModal = function() {
                $('.student-checkbox').prop('checked', true);
                $('.student-checkbox').each(function() {
                    const studentId = $(this).val();
                    selectedStudents.add(studentId.toString());
                });
                updateSelectedCount();
                updateSelectedList();
            };
            
            window.deselectAllInModal = function() {
                $('.student-checkbox').prop('checked', false);
                $('.student-checkbox').each(function() {
                    const studentId = $(this).val();
                    selectedStudents.delete(studentId.toString());
                });
                updateSelectedCount();
                updateSelectedList();
            };
            
            // Toggle student selection
            window.toggleStudent = function(studentId) {
                const checkbox = $(`#student_${studentId}`);
                if (checkbox.is(':checked')) {
                    selectedStudents.add(studentId.toString());
                } else {
                    selectedStudents.delete(studentId.toString());
                }
                updateSelectedCount();
                updateSelectedList();
            };
            
            // Update selected count
            function updateSelectedCount() {
                $('#selectedCount').text(selectedStudents.size);
            }
            
            // Update selected students list
            function updateSelectedList() {
                const container = $('#selectedStudents');
                container.empty();
                
                if (selectedStudents.size === 0) {
                    container.html('<p class="text-muted text-center">No students selected</p>');
                    return;
                }
                
                // Display selected students
                let html = '';
                currentStudentsList.forEach(student => {
                    if (selectedStudents.has(student.id.toString())) {
                        html += `
                            <div class="student-item">
                                <strong>${student.name || 'No Name'}</strong><br>
                                <small class="text-muted">
                                    Roll: ${student.roll_no || 'N/A'} | 
                                    Class: ${student.class?.name || 'N/A'}
                                </small>
                            </div>
                        `;
                    }
                });
                container.html(html);
            }
            
            // Select template
            window.selectTemplate = function(templateId) {
                currentTemplate = templateId;
                $('.template-preview').removeClass('active');
                $(`.template-preview[data-template="${templateId}"]`).addClass('active');
                loadTemplatePreview(templateId);
            };
            
            // Load template preview
            function loadTemplatePreview(templateId) {
                $.ajax({
                    url: '{% url "get_id_card_preview" %}',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({template_type: templateId}),
                    success: function(response) {
                        if (response.error) {
                            $('#previewArea').html(`<p class="text-danger">Error loading preview: ${response.error}</p>`);
                            return;
                        }
                        $('#previewArea').html(response.html);
                    },
                    error: function(xhr, status, error) {
                        let errorMsg = 'Error loading preview';
                        try {
                            const errorData = JSON.parse(xhr.responseText);
                            errorMsg = errorData.error || errorMsg;
                        } catch(e) {
                            errorMsg = error || xhr.statusText;
                        }
                        $('#previewArea').html(`<p class="text-danger">${errorMsg}</p>`);
                    }
                });
            }
            
            // Generate PDF
            function generatePdf() {
                if (selectedStudents.size === 0) {
                    alert('Please select at least one student');
                    return;
                }
                
                const layout = $('#layoutOption').val();
                
                // Show loading
                const originalBtnText = $('#generatePdf').html();
                $('#generatePdf').html('<i class="fas fa-spinner fa-spin"></i> Generating PDF...');
                $('#generatePdf').prop('disabled', true);
                
                $.ajax({
                    url: '{% url "generate_id_card_pdf" %}',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        student_ids: Array.from(selectedStudents),
                        template_type: currentTemplate,
                        layout: layout
                    }),
                    xhrFields: {
                        responseType: 'blob'
                    },
                    success: function(blob) {
                        const link = document.createElement('a');
                        link.href = window.URL.createObjectURL(blob);
                        link.download = `id_cards_${new Date().toISOString().slice(0,10)}.pdf`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        
                        // Reset button
                        $('#generatePdf').html(originalBtnText);
                        $('#generatePdf').prop('disabled', false);
                    },
                    error: function(xhr, status, error) {
                        let errorMsg = 'Error generating PDF';
                        try {
                            const errorData = JSON.parse(xhr.responseText);
                            errorMsg = errorData.error || errorMsg;
                        } catch(e) {
                            errorMsg = error || xhr.statusText;
                        }
                        alert('Error: ' + errorMsg);
                        
                        // Reset button
                        $('#generatePdf').html(originalBtnText);
                        $('#generatePdf').prop('disabled', false);
                    }
                });
            }
        });
    </script>
</body>
</html>
