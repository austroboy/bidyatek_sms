

<div class="d-flex justify-content-between pb-0">
  <div class="p-2 align-items-center">
    <button class="btn btn-primary" hx-get="{% url 'add_service' %}" hx-target="#servicedialog"> 
      <i class='bx bx-plus-circle me-2'></i>
      Add
    </button>
  </div>
  <div class="d-none d-md-block">
    <div class="form-group">
      <input class="form-control" type="text" id="searchName" ng-model="searchName" placeholder="Type name to search" />
    </div>
  </div>
</div>

<div class="table-responsive card-body">
<table class="table table-nowrap mb-0">
  <thead class="teal-thead">
    <tr>
      <th>#</th>
      <th>Icon Image</th>
      <th>Title</th>
      <th>Service Text</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for service in servicelist %}

    <tr>
      <td>
        {{forloop.counter}}
      </td>
      <td>
        <img src="{{service.icon.url}}" height="50px" width="50px" alt="">
      </td>
      <td>
        {{service.title}}
      </td>
      <td>
        {{service.service_text}}
      </td>
      <td>
        {{service.status}}
      </td>
      

      <td>
        <div class="dropdown">
          <button
            type="button"
            class="btn p-0 dropdown-toggle hide-arrow"
            data-bs-toggle="dropdown"
          >
            <i class="bx bx-dots-vertical-rounded"></i>
          </button>
          <div class="dropdown-menu">
            <a
              class="dropdown-item"
              href="javascript:void(0);"
              hx-get="{% url 'edit_service' pk=service.pk %}"
              hx-target="#servicedialog"
              ><i class="bx bx-edit-alt me-1"></i> Edit</a
            >
            <a
              class="dropdown-item"
              hx-delete="{% url 'del_service' pk=service.pk %}"
              href="javascript:void(0);"
              hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}'
              hx-target="#serviceadd"
              hx-confirm="are you want to delete?"
              ><i class="bx bx-trash me-1"></i> Delete</a
            >
          </div>
        </div>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
</div>
