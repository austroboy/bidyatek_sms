{% load widget_tweaks %}
{% block content %}
<form hx-post="{{ request.path }}" hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}' class="modal-content">
  <div>
    <h4 class="modal-header">Add-Edit Leave Quota</h4>
  </div>
  <div class="modal-body">
    <div class="mb-3">
      <label for="{{ form.group.id_for_label }}" class="form-label">Group</label>
      {% render_field form.group class+="form-control" placeholder="Group" %}
    </div> 
    <div class="mb-3">
      <label for="{{ form.leave_days_limit.id_for_label }}" class="form-label">Leave Days Limit</label>
      {% render_field form.leave_days_limit class+="form-control" placeholder="Leave Days Limit" %}
    </div> 
 
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
    <button type="submit" class="btn  btn-primary ">Save</button>
  </div>
</form>

{% endblock content %}
