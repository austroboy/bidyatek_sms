<!DOCTYPE html>
<html>
<head>
    <title>Download Admit Cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .form-section {
            display: none;
        }
        .active-section {
            display: block;
        }
        .optional-field {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Download Admit Cards</h1>
        
        <div class="mb-3">
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="download_type" 
                       id="bulkDownload" value="bulk" checked>
                <label class="form-check-label" for="bulkDownload">
                    Bulk Download
                </label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="download_type" 
                       id="individualDownload" value="individual">
                <label class="form-check-label" for="individualDownload">
                    Individual Download
                </label>
            </div>
        </div>

        <form method="post" id="admitCardForm">
            {% csrf_token %}
            
            <!-- Academic Year (common for both) -->
            <div class="mb-3">
                <label class="form-label">Academic Year</label>
                <select name="academic_year" class="form-select" required>
                    <option value="">Select Academic Year</option>
                    {% for year in academic_years %}
                        <option value="{{ year.id }}">{{ year.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <!-- Bulk Download Section -->
            <div id="bulkSection" class="form-section active-section">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Class</label>
                        <select name="class" id="classSelect" class="form-select" required>
                            <option value="">Select Class</option>
                            {% for class in classes %}
                                <option value="{{ class.id }}">{{ class.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <!-- Sections - will be populated by AJAX -->
                    <div class="col-md-6 mb-3 optional-field" id="sectionField">
                        <label class="form-label">Section</label>
                        <select name="section" id="sectionSelect" class="form-select">
                            <option value="">Select Section</option>
                            {% for section in sections %}
                                <option value="{{ section.id }}">{{ section.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <!-- Groups - will be populated by AJAX -->
                    <div class="col-md-6 mb-3 optional-field" id="groupField">
                        <label class="form-label">Group</label>
                        <select name="group" id="groupSelect" class="form-select">
                            <option value="">Select Group</option>
                            {% for group in groups %}
                                <option value="{{ group.id }}">{{ group.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <!-- Shifts - will be populated by AJAX -->
                    <div class="col-md-6 mb-3 optional-field" id="shiftField">
                        <label class="form-label">Shift</label>
                        <select name="shift" id="shiftSelect" class="form-select">
                            <option value="">Select Shift</option>
                            {% for shift in shifts %}
                                <option value="{{ shift.id }}">{{ shift.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Version</label>
                        <select name="version" class="form-select" required>
                            <option value="">Select Version</option>
                            <option value="Bangla">Bangla</option>
                            <option value="English">English</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- Individual Download Section -->
            <div id="individualSection" class="form-section">
                <div class="mb-3">
                    <label class="form-label">Roll Number</label>
                    <input type="number" name="roll_no" 
                           class="form-control" placeholder="Enter Roll Number" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">Download</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const bulkRadio = document.getElementById('bulkDownload');
            const individualRadio = document.getElementById('individualDownload');
            const bulkSection = document.getElementById('bulkSection');
            const individualSection = document.getElementById('individualSection');
            
            function updateSections() {
                if (bulkRadio.checked) {
                    bulkSection.classList.add('active-section');
                    individualSection.classList.remove('active-section');
                } else {
                    bulkSection.classList.remove('active-section');
                    individualSection.classList.add('active-section');
                }
            }
            
            bulkRadio.addEventListener('change', updateSections);
            individualRadio.addEventListener('change', updateSections);
            
            // AJAX for dynamic options
            $('#classSelect').change(function() {
                const classId = $(this).val();
                if (classId) {
                    $.get('/get-class-options/', {class_id: classId}, function(data) {
                        // Update sections
                        updateSelect('#sectionSelect', data.sections, '#sectionField');
                        
                        // Update groups
                        updateSelect('#groupSelect', data.groups, '#groupField');
                        
                        // Update shifts
                        updateSelect('#shiftSelect', data.shifts, '#shiftField');
                    });
                } else {
                    // Hide all optional fields if no class selected
                    $('.optional-field').hide();
                }
            });
            
            function updateSelect(selector, options, fieldSelector) {
                const $select = $(selector);
                $select.empty().append('<option value="">Select</option>');
                
                if (options && options.length > 0) {
                    $(fieldSelector).show();
                    options.forEach(function(option) {
                        $select.append(`<option value="${option[0]}">${option[1]}</option>`);
                    });
                } else {
                    $(fieldSelector).hide();
                }
            }
        });
    </script>
</body>
</html>
