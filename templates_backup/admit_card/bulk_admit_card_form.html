<!-- bulk_admit_card_form.html -->
{% extends 'partials/base.html' %}
{% load static %}

{% block extra_css %}
<link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css'>
<link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/select2-bootstrap-5-theme/1.3.0/select2-bootstrap-5-theme.min.css'>
<link rel="stylesheet" href="{% static 'assets/css/loading.css' %}" />
{% endblock extra_css %}

{% block content %}
<div id="loading-screen" style="display: none;">
    <figure>
        <div class="dot white"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </figure>
</div>

<div class="container-fluid flex-grow-1 container-p-y">
    {% include 'pageinfo.html' %}
    <div class="card">
        <div class="card-body">
            <div class="d-flex justify-content-between">
                <h4 class="card-title mb-4">Bulk Admit Card Download</h4>
            </div>

            <form method="post" id="admit-form">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="class_group" class="form-label">Class*</label>
                        <select class="form-select" id="class_group" name="class_group" required>
                            <option value="">Select Class</option>
                            {% for group in class_groups %}
                            <option value="{{ group.id }}">
                                {{ group.class_id.name }}{% if group.group_id %} - {{ group.group_id.name }}{% endif %}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="section" class="form-label">Section</label>
                        <select class="form-select" id="section" name="section">
                            <option value="all">All Sections</option>
                            {% for section in sections %}
                            <option value="{{ section.id }}">{{ section.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="group" class="form-label">Group</label>
                        <select class="form-select" id="group" name="group">
                            <option value="all">All Groups</option>
                            {% for group in groups %}
                            <option value="{{ group.id }}">{{ group.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="version" class="form-label">Version</label>
                        <select class="form-select" id="version" name="version">
                            <option value="all">All Versions</option>
                            <option value="Bangla">Bangla</option>
                            <option value="English">English</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="shift" class="form-label">Shift</label>
                        <select class="form-select" id="shift" name="shift">
                            <option value="all">All Shifts</option>
                            {% for shift in shifts %}
                            <option value="{{ shift.id }}">{{ shift.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="exam" class="form-label">Exam</label>
                        <select class="form-select" id="exam" name="exam" required>
                            <option value="">Select Exam</option>
                            {% for exam in exams %}
                            <option value="{{ exam.id }}">{{ exam.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- Add session filter row -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="academic_session" class="form-label">Academic Session</label>
                        <select class="form-select" id="academic_session" name="academic_session">
                            <option value="all">All Sessions</option>
                            {% for session in academic_sessions %}
                            <option value="{{ session.id }}">{{ session.start_year }}-{{ session.end_year }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <!-- Empty column for layout balance -->
                    </div>
                </div>

                <div class="d-flex justify-content-end">
                    <button type="submit" id="submit-btn" class="btn btn-primary">Download Admit Cards</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}

{% block extra_javascript %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
<script>
    // Enable select2 with Bootstrap 5 theme
    $('select').select2({
        theme: 'bootstrap-5',
        width: '100%'
    });

    // Show loading screen on form submit
    document.getElementById("admit-form").addEventListener("submit", function () {
        document.getElementById("loading-screen").style.display = "block";
        document.getElementById("submit-btn").disabled = true;
    });
</script>
{% endblock extra_javascript %}
