{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIDYATek</title>
  <style>
    /* ===============================
       BIDYATek Login – Book Theme
       =============================== */
    :root {
      --theme: #568490;
      --theme-rgb: 86, 132, 144;
      --theme-dark: #3f6f79;
      --theme-darker: #2c525a;
      --bg: #f0f4f7;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(15, 23, 42, 0.10);
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.10);
      --soft: rgba(var(--theme-rgb), 0.12);
      --soft-2: rgba(var(--theme-rgb), 0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f6fafb 0%, var(--bg) 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text);
      padding: 16px;
    }

    /* ---------- book container ---------- */
    .scene {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 3000px;
    }

    .book {
      position: relative;
      width: 100%;
      max-width: 1000px;
      height: auto;
      display: flex;
      flex-wrap: wrap;
      box-shadow: 
        0 20px 40px rgba(0,0,0,0.3),
        0 0 0 2px var(--theme-darker) inset,
        0 0 0 4px rgba(255,255,255,0.5) inset;
      border-radius: 16px 16px 16px 16px;
      transform-style: preserve-3d;
      transition: transform 0.4s ease;
      background: #fff9f0;  /* old paper colour */
      overflow: hidden;
    }

    /* open animation – triggered on submit */
    .book.open {
      transform: rotateY(-6deg) scale(1.02);
      box-shadow: 
        0 30px 60px rgba(0,0,0,0.4),
        0 0 0 2px var(--theme) inset,
        0 0 0 4px rgba(255,255,255,0.6) inset;
    }

    /* two pages (left & right) */
    .page {
      flex: 1 1 300px;
      min-width: 280px;
      padding: 40px 24px;
      background: #fffaf2;
      background-image: 
        linear-gradient(rgba(86,132,144,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(86,132,144,0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.02);
    }

    /* spine effect (visible between pages) */
    .left-page {
      border-right: 4px solid var(--theme-darker);
      border-radius: 16px 0 0 16px;
      position: relative;
    }
    .left-page::after {
      content: '';
      position: absolute;
      right: -8px;
      top: 20px;
      bottom: 20px;
      width: 12px;
      background: linear-gradient(90deg, #b0885c, #8b5e3c);
      border-radius: 4px;
      box-shadow: inset -1px 0 3px rgba(0,0,0,0.3);
      z-index: 2;
    }

    .right-page {
      border-left: 4px solid var(--theme-darker);
      border-radius: 0 16px 16px 0;
    }

    /* left page content */
    .logo {
      text-align: center;
      margin-top: 20px;
    }
    .logo-img {
      max-width: 200px;
      border-radius: 12px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.1);
    }
    .welcome-text {
      margin-top: 30px;
      text-align: center;
      color: var(--theme-darker);
      font-size: 22px;
      font-weight: bold;
    }
    .quote {
      margin: 30px 0;
      font-style: italic;
      color: var(--muted);
      text-align: center;
      padding: 0 20px;
    }

    /* right page – login form */
    .login-title {
      color: var(--theme);
      font-size: 24px;
      margin-bottom: 24px;
      text-align: center;
      font-weight: 800;
    }
    .highlight {
      color: var(--theme-darker);
    }

    .input-group {
      display: flex;
      align-items: center;
      gap: 10px;
      background-color: var(--soft);
      padding: 10px 12px;
      margin-bottom: 15px;
      border-radius: 10px;
      width: 100%;
      border: 1px solid rgba(var(--theme-rgb), 0.22);
      transition: box-shadow .2s ease, border-color .2s ease;
    }
    .input-group:focus-within {
      background-color: var(--soft-2);
      border-color: rgba(var(--theme-rgb), 0.45);
      box-shadow: 0 0 0 4px rgba(var(--theme-rgb), 0.16);
    }
    .input-group .icon {
      color: var(--theme-darker);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      cursor: default;
    }
    .input-group .icon.show {
      cursor: pointer;
    }
    .input-group input {
      border: none;
      background: none;
      flex: 1;
      font-size: 15px;
      padding: 4px 0;
      color: var(--text);
    }
    .input-group input::placeholder {
      color: rgba(15,23,42,0.55);
    }
    .input-group input:focus {
      outline: none;
    }

    .login-button {
      display: block;
      margin: 20px auto 0;
      width: 160px;
      padding: 12px 18px;
      background: linear-gradient(90deg, var(--theme-darker), var(--theme));
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
      box-shadow: 0 10px 18px rgba(var(--theme-rgb), 0.3);
    }
    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 24px rgba(var(--theme-rgb), 0.4);
    }

    .social-login {
      display: flex;
      gap: 14px;
      width: 100%;
      text-align: center;
      margin-top: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .social-login button {
      flex: 1;
      min-width: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid rgba(15,23,42,0.12);
      border-radius: 30px;
      cursor: pointer;
      background: #fff;
      font-size: 14px;
      transition: 0.25s ease;
    }
    .social-login button p {
      margin: 0;
      color: rgba(15,23,42,0.75);
      font-weight: 700;
    }
    .social-login button img {
      width: 20px;
      height: 20px;
    }
    .google-button {
      border-color: rgba(219, 68, 55, 0.30);
    }
    .google-button:hover {
      background-color: rgba(219, 68, 55, 0.06);
      transform: translateY(-1px);
    }
    .facebook-button {
      border-color: rgba(59, 89, 152, 0.30);
    }
    .facebook-button:hover {
      background-color: rgba(59, 89, 152, 0.06);
      transform: translateY(-1px);
    }

    /* error message */
    .error-msg {
      color: tomato;
      padding-bottom: 10px;
      text-align: center;
    }

    /* responsive: book becomes flat on small screens */
    @media (max-width: 768px) {
      .book {
        flex-direction: column;
        transform: none !important;
      }
      .left-page, .right-page {
        border: none;
        border-radius: 16px;
      }
      .left-page::after {
        display: none;
      }
      .left-page {
        border-bottom: 4px solid var(--theme-darker);
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="book" id="book">
      <!-- LEFT PAGE (logo & welcome) -->
      <div class="page left-page">
        <div class="logo">
          <img src="{% static 'assets/img/essential/bidyateklogo.jpeg' %}" alt="BidyaTek Logo" class="logo-img" />
        </div>
        <div class="welcome-text">Welcome to BidyaTek</div>
        <div class="quote">“Powering Smart Education”</div>
        <div style="text-align: center; margin-top: 40px;">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--theme)" stroke-width="1">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
          </svg>
        </div>
      </div>

      <!-- RIGHT PAGE (login form) -->
      <div class="page right-page">
        <h3 class="login-title">Log In to <span class="highlight">BidyaTek</span></h3>

        <form id="loginForm" action="{% url 'login' %}" method="POST">
          {% csrf_token %}
          <div class="input-group">
            <span class="icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-bounding-box" viewBox="0 0 16 16">
                <path d="M1.5 1a.5.5 0 0 0-.5.5v3a.5.5 0 0 1-1 0v-3A1.5 1.5 0 0 1 1.5 0h3a.5.5 0 0 1 0 1zM11 .5a.5.5 0 0 1 .5-.5h3A1.5 1.5 0 0 1 16 1.5v3a.5.5 0 0 1-1 0v-3a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 1-.5-.5M.5 11a.5.5 0 0 1 .5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 1 0 1h-3A1.5 1.5 0 0 1 0 14.5v-3a.5.5 0 0 1 .5-.5m15 0a.5.5 0 0 1 .5.5v3a1.5 1.5 0 0 1-1.5 1.5h-3a.5.5 0 0 1 0-1h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 1 .5-.5"/>
                <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm8-9a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
              </svg>
            </span>
            <input type="text" name="username" required placeholder="Username" />
          </div>

          <div class="input-group">
            <span class="icon show" id="show-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16">
                <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0"/>
                <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8m8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7"/>
              </svg>
            </span>
            <input type="password" id="password-field" name="password" required placeholder="Password" />
          </div>

          {% for message in messages %} 
            {% if message.tags == 'error' %} 
              <div class="error-msg">{{ message }}</div>
            {% endif %} 
          {% endfor %}

          <button type="submit" class="login-button" id="loginBtn">Login Now</button>

          <div class="social-login">
            <button class="google-button" type="button">
              <img src="https://img.icons8.com/?size=100&id=16713&format=png&color=000000" alt="Google" />
              <p>+8801569-107-472</p>
            </button>
            <button class="facebook-button" type="button">
              <img src="https://img.icons8.com/?size=100&id=I24lanX6Nq71&format=png&color=000000" alt="Facebook" />
              <p>+8801847-293-000</p>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Password toggle (unchanged)
    const passwordField = document.getElementById('password-field');
    const showIcon = document.getElementById('show-icon');
    const eyeOpen = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16"><path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0"/><path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8m8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7"/></svg>`;
    const lockClosed = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lock" viewBox="0 0 16 16"><path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2m3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2M5 8h6a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1"/></svg>`;

    showIcon.addEventListener('click', () => {
      if (passwordField.type === 'password') {
        passwordField.type = 'text';
        showIcon.innerHTML = lockClosed;
      } else {
        passwordField.type = 'password';
        showIcon.innerHTML = eyeOpen;
      }
    });

    // Book open animation on form submit
    const form = document.getElementById('loginForm');
    const book = document.getElementById('book');

    form.addEventListener('submit', function (e) {
      e.preventDefault();  // stop immediate submit

      // Add open class to animate the book
      book.classList.add('open');

      // Wait a bit for animation to be visible, then submit
      setTimeout(() => {
        form.submit();  // normal Django POST
      }, 300); // 300ms matches transition duration
    });
  </script>
</body>
</html>
