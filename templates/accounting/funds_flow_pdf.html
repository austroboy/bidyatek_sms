<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h3 {
            text-align: center;
            font-size: 18px;
            margin-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #e3f2fd;
            font-weight: bold;
        }
        .total-row {
            font-weight: bold;
            background-color: #e3f2fd;
        }
    </style>
</head>
<body>
    <h3>Funds Flow Report - {{ year }}</h3>

    <table>
        <thead>
            <tr>
                <th>Particulars</th>
                <th>Opening</th>
                <th>Closing</th>
                <th>Funds Flow</th>
            </tr>
        </thead>
        <tbody>
            {% for data in funds_flow_data %}
            <tr>
                <td>{{ data.month }}</td>
                <td>{{ data.opening }}</td>
                <td>{{ data.closing }}</td>
                <td>{{ data.funds_flow }}</td>
            </tr>
            {% endfor %}
            <tr class="total-row">
                <th>Grand Total</th>
                <th>0</th>
                <th>{{ closing_total }}</th>
                <th>{{ grand_total }}</th>
            </tr>
        </tbody>
    </table>
</body>
</html>
