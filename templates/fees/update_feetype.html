<form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>From Fee Type:</label>
      <select name="old_feetype" class="form-control">
        {% for ft in fee_types %}
          <option value="{{ ft.id }}">{{ ft.fees_title }}</option>
        {% endfor %}
      </select>
    </div>
    
    <div class="form-group">
      <label>To Fee Type:</label>
      <select name="new_feetype" class="form-control">
        {% for ft in fee_types %}
          <option value="{{ ft.id }}">{{ ft.fees_title }}</option>
        {% endfor %}
      </select>
    </div>
    
    <button type="submit" class="btn btn-danger">Update</button>
  </form>
