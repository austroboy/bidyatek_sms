{% extends 'partials/base.html' %} 
{% load static %} 
{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2-bootstrap-5-theme/1.3.0/select2-bootstrap-5-theme.min.css">
<style>
    .select2-container--open {
        z-index: 9999 !important;
    }

</style>
{% endblock extra_css %} 
{% block content %} 

<!-- start: Content -->
<div class="container-fluid flex-grow-1 container-p-y">
  {% include 'pageinfo.html' %}

  <div class="card">
    <div class="row  card-body" id="incrementadd" hx-get="{% url 'list_salary_increment' %}"
            hx-trigger="load, incrementListChanged from:body" hx-headers='{"Cache-Control": "no-cache"}'>
            <!-- list class -->
    </div>

    <!-- modal settings -->

    <div id="incrementmodal" class="modal">
        <div id="incrementdialog" class="modal-dialog modal-dialog-centered" hx-target="this">

        </div>
    </div>
  </div>
</div>
<!-- end: Content -->

{% endblock content %} {% block extra_javascript %}

<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.8.4"></script>

<script>
    

    // Reinitialize Select2 when HTMX swaps content
    htmx.on('htmx:afterSwap', function(e) {
        if (e.detail.target.id === 'incrementdialog') {
            $('.select2').select2({
                theme: 'bootstrap-5',
                placeholder: "Select an option",
                allowClear: true,
                dropdownParent: $("#incrementmodal")
            });
        }
    });
     (function () {
        const modal = new bootstrap.Modal(document.getElementById("incrementmodal"))

        htmx.on("htmx:afterSwap", (e) => {
            // Response targeting #dialog => show the modal
            if (e.detail.target.id == "incrementdialog") {
                modal.show()
            }
        })

        htmx.on("htmx:beforeSwap", (e) => {
            // Empty response targeting #dialog => hide the modal
            if (e.detail.target.id == "incrementdialog" && !e.detail.xhr.response) {
                modal.hide()
                e.detail.shouldSwap = false
                if (e.detail.xhr.getResponseHeader("HX-Trigger")) {
                    // Extract the 'HX-Trigger' header value (which is a JSON string)
                    const hxTriggerHeader = e.detail.xhr.getResponseHeader("HX-Trigger");
          
                    if (hxTriggerHeader) {
                      const hxTriggerData = JSON.parse(hxTriggerHeader);
          
                      if (hxTriggerData.messages === "Success") {
                        
                          htmx.trigger("#pageinfo", "refresh");
                          
                      }
                    }
                  }
            }
        })

        // Remove dialog content after hiding
        htmx.on("hidden.bs.modal", () => {
            document.getElementById("incrementdialog").innerHTML = ""
        })
    })()
</script>

<script>
    htmx.on('htmx:afterSwap', function (e) {
    if (e.detail.target.id === 'incrementadd') {
        const searchInput = document.getElementById('searchName');
        if (searchInput) {
            searchInput.addEventListener('input', function () {
                let filter = this.value.toLowerCase();
                let rows = document.querySelectorAll('table tbody tr');

                rows.forEach(row => {
                    let employeeName = row.querySelector('td:nth-child(2)').textContent.toLowerCase();
                    if (employeeName.includes(filter)) {
                        row.style.display = ''; // Show row
                    } else {
                        row.style.display = 'none'; // Hide row
                    }
                });
            });
        }
    }
});



</script>
{% endblock extra_javascript%}
