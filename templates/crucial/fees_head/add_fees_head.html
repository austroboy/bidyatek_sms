{% load widget_tweaks %}
{% block content %}
<form hx-post="{{ request.path }}" hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}' class="modal-content">
  <div>
    <h4 class="modal-header">Add-Edit Fees Head</h4>
  </div>
  <div class="modal-body">
    <div class="mb-3">
      <label for="{{ form.name.id_for_label }}" class="form-label">FeeHead Name</label>
      {% render_field form.name class+="form-control" placeholder="FeeHead Name" %}
    </div>
    <div class="mb-3">
      <label for="{{ form.description.id_for_label }}" class="form-label">FeeHead Description</label>
      {% render_field form.description class+="form-control" placeholder="FeeHead Description" %}
    </div>
  </div> 
  <div class="modal-footer">
    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
    <button type="submit" class="btn btn-primary ">Save</button>
  </div>
</form>

{% endblock content %}
