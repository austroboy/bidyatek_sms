

<div class="d-flex justify-content-between pb-0">
    <div class="p-2 align-items-center">
      <button class="btn btn-primary" hx-get="{% url 'addgrade' %}" hx-target="#gradedialog"> 
        <i class='bx bx-plus-circle me-2'></i>
        Add
      </button>
    </div>
    <div class=" d-none d-md-block">
      <div class="form-group">
        <input class="form-control" type="text" id="searchName" ng-model="searchName" placeholder="Type name to search" />
      </div>
    </div>
  </div>
  
  <div class="table-responsive card-body">
  <table class="table table-nowrap mb-0">
    <thead class="teal-thead">
      <tr class="shadow-sm">
        <th scope="col">ID</th>
        <th scope="col">Grade Name</th>
        <th scope="col">GPA</th>
        <th scope="col">Minimum Mark</th>
        <th scope="col">Maximum Mark</th>
        <th scope="col">Action</th>
      </tr>
    </thead>
    <tbody>
        {% for grade in gradelist %}
  
      <tr>
        <td>
            {{forloop.counter}}
        </td>
        <td>
            {{grade.grade_name}}
        </td>
        <td>
            {{grade.gpa}}
        </td>
        <td>
            {{grade.min_mark}}
        </td>
        <td>
            {{grade.max_mark}}
        </td>
  
        <td>
          <div class="dropdown">
            <button
              type="button"
              class="btn p-0 dropdown-toggle hide-arrow"
              data-bs-toggle="dropdown"
            >
              <i class="bx bx-dots-vertical-rounded"></i>
            </button>
            <div class="dropdown-menu">
              <a
                class="dropdown-item"
                href="javascript:void(0);"
                hx-get="{% url 'editgrade' pk=grade.pk %}"
                hx-target="#gradedialog"
                ><i class="bx bx-edit-alt me-1"></i> Edit</a
              >
              <a
                class="dropdown-item"
                hx-delete="{% url 'delgrade' pk=grade.pk %}"
                href="javascript:void(0);"
                hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}'
                hx-target="#gradeadd"
                hx-confirm="are you want to delete?"
                ><i class="bx bx-trash me-1"></i> Delete</a
              >
            </div>
          </div>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  </div>
