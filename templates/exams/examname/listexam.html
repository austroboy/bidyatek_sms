<div class="d-flex justify-content-between pb-0">
  <div class="p-2 align-items-center">
    <button class="btn btn-primary" hx-get="{% url 'addexamname' %}" hx-target="#examdialog"> 
      <i class='bx bx-plus-circle me-2'></i>
      Add
    </button>
  </div>
  <div class="d-flex">
    <div class="form-group d-none d-md-block">
      <input class="form-control" type="text" id="searchName" ng-model="searchName" placeholder="Type name to search" />
    </div>
  </div>
</div>

<div class="table-responsive card-body">
  <table style="width: 100%;" class="table table-centered table-nowrap mb-0">
  <thead style="background-color:rgba(20, 168, 154, 0.12) !important ;">
    <tr class="shadow-sm">
      <th>#</th>
      <th>Exam Name </th>
      <th>Start Date </th>
      <th>End Date </th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for exam in examname %}

    <tr>
      <td>
        {{forloop.counter}}
      </td>
      <td>
        {{exam.name}}
      </td>
      <td>
        {{exam.academic_year.name}}
      </td>
      <td>
        {{exam.start_date}}
      </td>
      <td>
        {{exam.end_date}}
      </td>

      <td>
        <div class="dropdown">
          <button
            type="button"
            class="btn p-0 dropdown-toggle hide-arrow"
            data-bs-toggle="dropdown"
          >
            <i class="bx bx-dots-vertical-rounded"></i>
          </button>
          <div class="dropdown-menu">
            <a
              class="dropdown-item"
              href="javascript:void(0);"
              hx-get="{% url 'editexamname' pk=exam.pk %}"
              hx-target="#examdialog"
              ><i class="bx bx-edit-alt me-1"></i> Edit</a
            >
            <a
              class="dropdown-item"
              hx-delete="{% url 'delexamname' pk=exam.pk %}"
              href="javascript:void(0);"
              hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}'
              hx-target="#examadd"
              hx-confirm="are you want to delete?"
              ><i class="bx bx-trash me-1"></i> Delete</a
            >
          </div>
        </div>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
</div>
