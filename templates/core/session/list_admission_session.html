<div class="col-lg-12">
  <div class="py-4">
    <h4 class="teal-thead" class="card-title mb-4">Admission Year List</h4>

    <div class="table-responsive">
      <table class="table table-centered table-nowrap mb-0">
        <thead>
          <tr>
            
            <th scope="col">ID</th>
            <th scope="col">Admission Year</th>
            <th scope="col">Action</th>
          </tr>
        </thead>
        <tbody>
          {% for session in listsession %}
          <tr>
           
            <td>{{forloop.counter}}</td>

            <td>{{session.name}}</td>

            <td>
              <a
                href="#"
                hx-get="{% url 'edit_addmission_session' pk=session.pk %}"
                hx-target="#dialog"
                class="btn btn-sm btn-primary btn-edit me-1 px-2 mb-md-0"
                title="Edit"
                data-toggle="tooltip"
                >Edit</a
              >
              <!-- <a
                href="#"
                hx-delete="{% url 'del_addmission_session' pk=session.pk %}"
                hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}'
                hx-target="#sessionadd"
                hx-confirm="are you want to delete?"
                class="btn btn-sm btn-danger btn-delete px-2"
                title="Delete"
                data-toggle="tooltip"
                >Delete
              </a> -->
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
  <!-- end card -->
</div>
<!-- end col -->
