<!-- single_admit_card_form.html -->
{% extends 'partials/base.html' %}
{% load static %}

{% block extra_css %}
<link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css'>
<link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/select2-bootstrap-5-theme/1.3.0/select2-bootstrap-5-theme.min.css'>
<link rel="stylesheet" href="{% static 'assets/css/loading.css' %}" />
{% endblock extra_css %}

{% block content %}
<div id="loading-screen" style="display: none;">
    <figure>
        <div class="dot white"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </figure>
</div>

<div class="container-fluid flex-grow-1 container-p-y">
    {% include 'pageinfo.html' %}
    <div class="card">
        <div class="card-body">
            <div class="d-flex justify-content-between">
                <h4 class="card-title mb-4">Single Admit Card Download</h4>
            </div>

            <form method="post" id="single-admit-form">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="search_term" class="form-label">Search by Roll Number or Name</label>
                        <input type="text" class="form-control" id="search_term" name="search_term" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="exam" class="form-label">Exam</label>
                        <select class="form-select" id="exam" name="exam" required>
                            <option value="">Select Exam</option>
                            {% for exam in exams %}
                            <option value="{{ exam.id }}">{{ exam.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="academic_session" class="form-label">Academic Session</label>
                        <select class="form-select" id="academic_session" name="academic_session">
                            <option value="all">All Sessions</option>
                            {% for session in academic_sessions %}
                            <option value="{{ session.id }}">{{ session.start_year }}-{{ session.end_year }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <!-- Empty column for layout balance -->
                    </div>
                </div>
                <div class="d-flex justify-content-end">
                    <button type="submit" id="submit-btn" class="btn btn-primary">Search</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}

{% block extra_javascript %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
<script>
    // Enhance select with select2
    $('#exam, #academic_session').select2({
        theme: 'bootstrap-5',
        width: '100%'
    });

    // Loading screen on submit
    document.getElementById("single-admit-form").addEventListener("submit", function () {
        document.getElementById("loading-screen").style.display = "block";
        document.getElementById("submit-btn").disabled = true;
    });
</script>
{% endblock extra_javascript %}
