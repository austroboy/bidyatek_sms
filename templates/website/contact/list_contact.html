<div class="d-flex justify-content-between pb-0">
  <div class="p-2 align-items-center">
    <button class="btn btn-primary" hx-get="{% url 'add_contact' %}" hx-target="#contactdialog"> 
      <i class='bx bx-plus-circle me-2'></i>
      Add
    </button>
  </div>
  <div class="d-none d-md-block">
    <div class="form-group">
      <input class="form-control" type="text" id="searchName" ng-model="searchName" placeholder="Type name to search" />
    </div>
  </div>
</div>

<div class="table-responsive card-body">
<table class="table table-nowrap mb-0">
  <thead class="teal-thead">
    <tr>
      <th>#</th>
      <th>Text</th>
      <th>Office Address</th>
      <th>Mobile No</th>
      <th>Email</th>
      <th>Google Map</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for contact in contactlist %}

    <tr>
      <td>
        {{forloop.counter}}
      </td>
      <td>
        {{contact.text}}
      </td>
      <td>
        {{contact.office_address}}
      </td>
      <td>
        {{contact.mobile}}
      </td>
      <td>
        {{contact.email}}
      </td>
      <td>
        <iframe src="{{contact.google_map}}" width="200" height="200" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        
      </td>
      <td>
        {{contact.status}}
      </td>
      

      <td>
        <div class="dropdown">
          <button
            type="button"
            class="btn p-0 dropdown-toggle hide-arrow"
            data-bs-toggle="dropdown"
          >
            <i class="bx bx-dots-vertical-rounded"></i>
          </button>
          <div class="dropdown-menu">
            <a
              class="dropdown-item"
              href="javascript:void(0);"
              hx-get="{% url 'edit_contact' pk=contact.pk %}"
              hx-target="#contactdialog"
              ><i class="bx bx-edit-alt me-1"></i> Edit</a
            >
            <a
              class="dropdown-item"
              hx-delete="{% url 'del_contact' pk=contact.pk %}"
              href="javascript:void(0);"
              hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}'
              hx-target="#contactadd"
              hx-confirm="are you want to delete?"
              ><i class="bx bx-trash me-1"></i> Delete</a
            >
          </div>
        </div>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
</div>
